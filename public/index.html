<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestJS | Premium Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #0f172a;
            --accent: #e0234e; /* NestJS Red */
            --subtle: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .main-container {
            padding: 40px;
            max-width: 600px;
        }

        /* The Main NestJS Branding */
        .nestjs-brand {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: -4px;
            color: var(--text);
            line-height: 1;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Subtle indicator for the dot */
        .dot {
            color: var(--accent);
        }

        .sub-text {
            font-size: 1.1rem;
            color: var(--subtle);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 40px;
        }

        /* Minimal Button Group */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--text);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: var(--subtle);
        }

        /* Subtle Footer Version */
        .version {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            color: var(--subtle);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sub-text">Backend Boilerplate</div>
        
        <div class="nestjs-brand">
            Nest<span class="dot">JS</span>
        </div>

        <div class="actions">
            <a href="/docs" class="btn btn-primary">Documentation</a>
            <a href="https://github.com/anushashmani/Nest-Boilerplate-Psql-drizzle" class="btn btn-outline">Source Code</a>
        </div>
    </div>

    <div class="version">CORE_ENGINE // v1.0.0_STABLE</div>

</body>
</html>
